version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: textcomparison-postgres
    environment:
      POSTGRES_DB: textcomparison
      POSTGRES_USER: textuser
      POSTGRES_PASSWORD: textpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U textuser"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
